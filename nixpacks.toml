[phases.setup]
nixPkgs = ["python310", "python310Packages.pip"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt --break-system-packages"]

[phases.build]
cmds = [
    "cd backend && python manage.py collectstatic --noinput",
    "cd backend && python manage.py migrate"
]

[start]
cmd = "cd backend && python -m gunicorn backend.wsgi --log-file -"