{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAI</title>
<link rel="stylesheet" href="{% static 'css/home_page.css' %}">
<script src="{% static 'js/home_page.js' %}" defer></script>
</head>
<body>

<div class="app" id="app">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">MyAI</div>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>

        <div class="new-chat-btn" id="newChatBtn">
            <span>✏️</span> New Chat
        </div>

        <div class="sidebar-section-label">Menu</div>
        <div class="sidebar-item" data-action="profile">
            <span class="sidebar-icon">👤</span> Profile
        </div>
        <div class="sidebar-item" data-action="themes">
            <span class="sidebar-icon">🎨</span> Themes
        </div>
        <div class="sidebar-item" data-action="settings">
            <span class="sidebar-icon">⚙️</span> Settings
        </div>

        <div class="sidebar-section-label">Recent</div>
        <div class="history-list" id="historyList">
            <div class="history-loading">Loading...</div>
        </div>

        <div class="sidebar-item logout" data-action="logout">
            <span class="sidebar-icon">🚪</span> Logout
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">

        <!-- HEADER -->
        <div class="header" id="header">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="logo">MyAI</div>
            </div>
            <div class="username-pill">👤 {{ username }}</div>
        </div>

        <!-- RESULTS AREA -->
        <div class="results-area" id="resultsArea"></div>

        <!-- SEARCH WRAPPER — hero lives inside here now -->
        <div class="search-wrapper" id="searchWrapper">

            <!-- HERO inside search wrapper -->
            <div class="hero" id="hero">
                <div class="hero-greeting">Hello, <span>{{ username }}</span> 👋</div>
                <div class="hero-subtitle">Ask anything. Get answers from AI, YouTube & the web.</div>
            </div>

            <div class="search-box" id="searchBox">
                <input type="text" placeholder="Ask anything..." class="search-input" id="searchInput">
                <button class="ask-btn" id="askBtn">
                    <span class="btn-text">Ask</span>
                    <span class="btn-loader" id="btnLoader"></span>
                </button>
            </div>

            <div class="suggestions" id="suggestions">
                <div class="chip">Python tutorial</div>
                <div class="chip">SQL queries</div>
                <div class="chip">DSA problems</div>
                <div class="chip">React interview</div>
                <div class="chip">System design</div>
                <div class="chip">AI tools</div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
