{% load static %}
<!-- <script src="{% static 'js/login_page.js' %}" defer></script> -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="csrf-token" content="{{ csrf_token }}"> -->

    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/sign_up.css' %}">
</head>
<body>
    <div class="outer">
        <div class="logo">
            <!-- <img src="" alt=""> -->
            <div class="web_name"></div>
        </div>
        <div class="inner">
            <div class="texts">
                <div class="text1">Create an account now</div>
                <div class="text2">Please enter your details</div>
            </div>
            <div class="inputs">
                <input type="email" name="email" class="email" placeholder="Email adress">
                <input type="text" name="username" class="username" placeholder="Username">
                <input type="password" name="password" class="password" placeholder="Password">
            </div>
            <div class="button">
                <button type="submit" class="signup">Sign Up</button>
            </div>
            <div class="text3">Already have an account?   <a href="/login/" class="signin">Sign In</a></div>
        </div>
    </div>

       

    <script>
                document.addEventListener("DOMContentLoaded", function () {

                function getCookie(name) {
                    let cookieValue = null;
                    if (document.cookie && document.cookie !== "") {
                        const cookies = document.cookie.split(";");
                        for (let i = 0; i < cookies.length; i++) {
                            const cookie = cookies[i].trim();
                            if (cookie.startsWith(name + "=")) {
                                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                break;
                            }
                        }
                    }
                    return cookieValue;
                }

                const csrftoken = getCookie("csrftoken");

                function validPassword(pw) {
                    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
                    return regex.test(pw);
                }

                document.querySelector(".signup").addEventListener("click", async function () {

                    const username = document.querySelector(".username").value;
                    const email = document.querySelector(".email").value;
                    const password = document.querySelector(".password").value;

                    if (!validPassword(password)) {
                        alert("Password must contain uppercase, lowercase, number, symbol and be at least 8 characters");
                        return;
                    }

                    const res = await fetch("/api/register/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": csrftoken
                        },
                        credentials: "same-origin",
                        body: JSON.stringify({ username, email, password })
                    });

                    const result = await res.json();

                    if (res.ok) {
                        alert("Signup successful!");
                        // window.location.href = "/login/";
                        window.location.href = "/home/";
                    } else {
                        alert(result.error || JSON.stringify(result));
                    }
                });

            });
        </script>


</body>
</html>
