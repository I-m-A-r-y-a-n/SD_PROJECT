{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="csrf-token" content="{{ csrf_token }}">     -->

    <title>Document</title>
    
    <link rel="stylesheet" href="{% static 'css/login_page.css' %}">
    <script src="{% static 'js/login_page.js' %}" defer></script>
</head>
<body>
    <div class="outer">
        <div class="logo">
            <!-- <img src="" alt=""> -->
            <div class="web_name"></div>
        </div>
        <div class="inner">
            <div class="texts">
                <div class="text1">Welcome back</div>
                <div class="text2">Please enter your details</div>
            </div>
            <div class="inputs">
                <input type="email" name="email" class="email" placeholder="Email adress">
                <input type="password" name="password" class="password" placeholder="Password">
            </div>
            <div class="button">
                <button class="signin">Sign in</button>
            </div>
            <div class="text3">Don't have an account?   <a href="/signup/" class="signup">Sign Up</a></div>
        </div>
    </div>
</body>
</html>
